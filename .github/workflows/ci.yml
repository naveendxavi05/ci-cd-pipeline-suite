name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Start Selenium Grid
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for Grid to be ready
        run: |
          timeout 90 bash -c \
            'until curl -sf http://localhost:4444/status | grep -q "\"ready\":true"; do
              echo "Waiting for Grid..."; sleep 3;
            done'
          echo "Grid is ready"

      - name: Run tests on Grid
        run: |
          ./mvnw test \
            -Dtestng.suiteXml=src/test/resources/testng-grid.xml \
            -DGRID_URL=http://localhost:4444

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/

      - name: Stop Selenium Grid
        if: always()
        run: docker compose -f docker/docker-compose.yml down